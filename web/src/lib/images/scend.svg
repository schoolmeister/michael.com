<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="8" fill="#05040a" />
  <!-- neon ground steps -->
  <g filter="url(#g)" stroke-linecap="round">
    <path d="M6 46 H22 V38 H40 V30 H58" fill="none" stroke="#3a2a6e" stroke-width="3" />
    <!-- ascending speed arrows -->
    <path d="M10 40 L20 30" stroke="#00f0ff" stroke-width="3" fill="none" />
    <path d="M26 34 L36 24" stroke="#00f0ff" stroke-width="3" fill="none" />
    <path d="M42 26 L52 16" stroke="#ff2079" stroke-width="3" fill="none" />
    <!-- the runner -->
    <rect x="14" y="20" width="9" height="12" rx="2" fill="#00f0ff" />
  </g>
</svg>
